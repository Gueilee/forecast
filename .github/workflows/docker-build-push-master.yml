name: Build and Push Docker Image to Azure Container Registry

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do redeploy manual'
        required: false
        default: 'Redeploy manual'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Gerar tag única de build
        run: echo "BUILD_TAG=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Copiar Dockerfile.prod para Dockerfile
        run: cp Dockerfile.prod Dockerfile

      - name: Preencher variáveis sensíveis no .env.docker.prod
        run: |
          escape() { printf '%s\n' "$1" | sed -e 's/[\/&]/\\&/g'; }
          sed -i "s|^NEXTAUTH_SECRET=.*|NEXTAUTH_SECRET=$(escape "${{ secrets.ENV_PROD_NEXTAUTH_SECRET }}")|g" .env.docker.prod
          sed -i "s|^TURSO_AUTH_TOKEN=.*|TURSO_AUTH_TOKEN=$(escape "${{ secrets.ENV_PROD_TURSO_AUTH_TOKEN }}")|g" .env.docker.prod
          sed -i "s|^CONEXOS_PASSWORD=.*|CONEXOS_PASSWORD=$(escape "${{ secrets.ENV_PROD_CONEXOS_PASSWORD }}")|g" .env.docker.prod
          sed -i "s|^MAILER_DSN=.*|MAILER_DSN=$(escape "${{ secrets.AZURE_SMTP_MAILER_DSN }}")|g" .env.docker.prod
          echo "✅ .env.docker.prod preenchido"

      - name: Login to Azure Container Registry
        run: echo "${{ secrets.AZURE_ACR_PASSWORD_PROD }}" | docker login vdmprod.azurecr.io -u "${{ vars.AZURE_ACR_USERNAME_PROD }}" --password-stdin

      - name: Build Docker image
        run: docker build -t vendemmia-forecast .

      - name: Tag e Push para Azure ACR
        run: |
          docker tag vendemmia-forecast vdmprod.azurecr.io/samples/vendemmia-forecast:latest
          docker tag vendemmia-forecast vdmprod.azurecr.io/samples/vendemmia-forecast:$BUILD_TAG
          docker push vdmprod.azurecr.io/samples/vendemmia-forecast:latest
          docker push vdmprod.azurecr.io/samples/vendemmia-forecast:$BUILD_TAG
          echo "✅ Imagem publicada: $BUILD_TAG"

      - name: Recriar container no Portainer
        env:
          PORTAINER_USER: ${{ vars.PORTAINER_USER_PROD }}
          PORTAINER_PASS: ${{ secrets.PORTAINER_PASS_PROD }}
          ACR_AUTH_B64: ${{ secrets.AZURE_ACR_AUTH_B64 }}
          ACR_USERNAME: ${{ vars.AZURE_ACR_USERNAME_PROD }}
          ACR_PASSWORD: ${{ secrets.AZURE_ACR_PASSWORD_PROD }}
        run: python3 .github/scripts/portainer_deploy.py

      - name: Remover imagens Docker não utilizadas
        env:
          PORTAINER_USER: ${{ vars.PORTAINER_USER_PROD }}
          PORTAINER_PASS: ${{ secrets.PORTAINER_PASS_PROD }}
        run: |
          TOKEN=$(curl -k -s -X POST "https://191.233.21.33:9000/api/auth" \
            -H "Content-Type: application/json" \
            -d "{\"Username\":\"$PORTAINER_USER\",\"Password\":\"$PORTAINER_PASS\"}" \
            | jq -r '.jwt // empty' 2>/dev/null || true)
          if [ -n "$TOKEN" ]; then
            curl -k -s -X POST "https://191.233.21.33:9000/api/endpoints/3/docker/v1.41/images/prune" \
              -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
              -d '{}' -w "\nPrune HTTP %{http_code}\n" || true
            echo "✅ Prune concluído"
          else
            echo "⚠️ Token Portainer não obtido — pulando prune"
          fi
