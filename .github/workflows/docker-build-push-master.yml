name: Build and Push Docker Image to Azure Container Registry

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copiar Dockerfile.prod para Dockerfile
        run: cp Dockerfile.prod Dockerfile

      - name: Preencher variáveis sensíveis no .env.docker.prod
        run: |
          escape() {
            printf '%s\n' "$1" | sed -e 's/[\/&]/\\&/g'
          }

          NEXTAUTH_SECRET_ESCAPED=$(escape "${{ secrets.ENV_PROD_NEXTAUTH_SECRET }}")
          TURSO_AUTH_TOKEN_ESCAPED=$(escape "${{ secrets.ENV_PROD_TURSO_AUTH_TOKEN }}")
          CONEXOS_PASSWORD_ESCAPED=$(escape "${{ secrets.ENV_PROD_CONEXOS_PASSWORD }}")
          MAILER_DSN_ESCAPED=$(escape "${{ secrets.AZURE_SMTP_MAILER_DSN }}")

          sed -i "s|^NEXTAUTH_SECRET=.*|NEXTAUTH_SECRET=$NEXTAUTH_SECRET_ESCAPED|g" .env.docker.prod
          sed -i "s|^TURSO_AUTH_TOKEN=.*|TURSO_AUTH_TOKEN=$TURSO_AUTH_TOKEN_ESCAPED|g" .env.docker.prod
          sed -i "s|^CONEXOS_PASSWORD=.*|CONEXOS_PASSWORD=$CONEXOS_PASSWORD_ESCAPED|g" .env.docker.prod
          sed -i "s|^MAILER_DSN=.*|MAILER_DSN=$MAILER_DSN_ESCAPED|g" .env.docker.prod

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: vdmprod.azurecr.io
          username: ${{ vars.AZURE_ACR_USERNAME_PROD }}
          password: ${{ secrets.AZURE_ACR_PASSWORD_PROD }}

      - name: Build Docker image
        run: docker build -t vendemmia-forecast .

      - name: Tag Docker image
        run: docker tag vendemmia-forecast vdmprod.azurecr.io/samples/vendemmia-forecast

      - name: Push Docker image to Azure Container Registry
        run: docker push vdmprod.azurecr.io/samples/vendemmia-forecast

      - name: Recriar container no Portainer
        run: |
          BASE="https://191.233.21.33:9000"
          EP=3
          CONTAINER_NAME="vendemmia-forecast"
          IMAGE="vdmprod.azurecr.io/samples/vendemmia-forecast:latest"

          echo "=== Autenticando no Portainer ==="
          AUTH_RESPONSE=$(curl -k -s -X POST "$BASE/api/auth" \
            -H "Content-Type: application/json" \
            -d '{"Username":"${{ vars.PORTAINER_USER_PROD }}","Password":"${{ secrets.PORTAINER_PASS_PROD }}"}')
          echo "Auth response: $AUTH_RESPONSE"

          TOKEN=$(echo "$AUTH_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('jwt',''))")
          if [ -z "$TOKEN" ]; then
            echo "❌ Falha na autenticação Portainer"
            exit 1
          fi
          echo "✅ Token obtido"

          echo "=== Buscando container ==="
          CONTAINERS=$(curl -k -s \
            "$BASE/api/endpoints/$EP/docker/v1.41/containers/json?all=true" \
            -H "Authorization: Bearer $TOKEN")
          echo "Containers: $(echo $CONTAINERS | python3 -c "import sys,json; [print(c['Names'],c['Id'][:12]) for c in json.load(sys.stdin)]" 2>/dev/null || echo $CONTAINERS)"

          CONTAINER_ID=$(echo "$CONTAINERS" | python3 -c "
          import sys,json
          containers = json.load(sys.stdin)
          for c in containers:
              names = c.get('Names', [])
              if any('$CONTAINER_NAME' in n for n in names):
                  print(c['Id'])
                  break
          ")

          if [ -z "$CONTAINER_ID" ]; then
            echo "❌ Container '$CONTAINER_NAME' não encontrado"
            exit 1
          fi
          echo "✅ Container: ${CONTAINER_ID:0:12}"

          echo "=== Parando container ==="
          curl -k -s -X POST "$BASE/api/endpoints/$EP/docker/v1.41/containers/$CONTAINER_ID/stop" \
            -H "Authorization: Bearer $TOKEN" -w "\nHTTP %{http_code}" || true

          echo "=== Pull da nova imagem ==="
          curl -k -s -X POST "$BASE/api/endpoints/$EP/docker/v1.41/images/create?fromImage=${IMAGE%:*}&tag=${IMAGE##*:}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-Registry-Auth: ${{ secrets.AZURE_ACR_AUTH_B64 }}" \
            -w "\nHTTP %{http_code}" || true

          echo "=== Iniciando container ==="
          START_CODE=$(curl -k -s -o /dev/null -w "%{http_code}" \
            -X POST "$BASE/api/endpoints/$EP/docker/v1.41/containers/$CONTAINER_ID/start" \
            -H "Authorization: Bearer $TOKEN")
          echo "Start HTTP: $START_CODE"

          if [ "$START_CODE" = "204" ] || [ "$START_CODE" = "304" ]; then
            echo "✅ Container reiniciado com sucesso"
          else
            echo "⚠️ Start retornou HTTP $START_CODE"
          fi

      - name: Remover imagens Docker não utilizadas
        run: |
          TOKEN=$(curl -k -s -X POST "https://191.233.21.33:9000/api/auth" \
            -H "Content-Type: application/json" \
            -d '{"Username":"${{ vars.PORTAINER_USER_PROD }}","Password":"${{ secrets.PORTAINER_PASS_PROD }}"}' \
            | grep -o '"jwt":"[^\"]*"' | cut -d':' -f2 | sed 's/["}]//g')
          curl -k -X POST "https://191.233.21.33:9000/api/endpoints/3/docker/images/prune" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json"
