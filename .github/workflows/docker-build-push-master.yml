name: Build and Push Docker Image to Azure Container Registry

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do redeploy manual'
        required: false
        default: 'Redeploy manual'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Sem actions/checkout — usa git puro para evitar Node.js 20 deprecated
      - name: Checkout código (git)
        run: |
          git init
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git fetch --depth=1 origin ${{ github.sha }}
          git checkout FETCH_HEAD
          echo "✅ Checkout: $(git log -1 --format='%h %s')"

      - name: Gerar tag única de build
        run: echo "BUILD_TAG=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Copiar Dockerfile.prod para Dockerfile
        run: cp Dockerfile.prod Dockerfile && echo "✅ Dockerfile copiado"

      - name: Preencher variáveis sensíveis no .env.docker.prod
        run: |
          escape() { printf '%s\n' "$1" | sed -e 's/[\/&]/\\&/g'; }
          sed -i "s|^NEXTAUTH_SECRET=.*|NEXTAUTH_SECRET=$(escape "${{ secrets.ENV_PROD_NEXTAUTH_SECRET }}")|g" .env.docker.prod
          sed -i "s|^TURSO_AUTH_TOKEN=.*|TURSO_AUTH_TOKEN=$(escape "${{ secrets.ENV_PROD_TURSO_AUTH_TOKEN }}")|g" .env.docker.prod
          sed -i "s|^CONEXOS_PASSWORD=.*|CONEXOS_PASSWORD=$(escape "${{ secrets.ENV_PROD_CONEXOS_PASSWORD }}")|g" .env.docker.prod
          sed -i "s|^MAILER_DSN=.*|MAILER_DSN=$(escape "${{ secrets.AZURE_SMTP_MAILER_DSN }}")|g" .env.docker.prod
          echo "✅ .env.docker.prod preenchido"

      - name: Login to Azure Container Registry
        run: |
          echo "${{ secrets.AZURE_ACR_PASSWORD_PROD }}" | \
            docker login vdmprod.azurecr.io \
              -u "${{ vars.AZURE_ACR_USERNAME_PROD }}" \
              --password-stdin
          echo "✅ Login ACR OK"

      - name: Build Docker image
        run: docker build -t vendemmia-forecast .

      - name: Tag Docker image
        run: docker tag vendemmia-forecast vdmprod.azurecr.io/samples/vendemmia-forecast

      - name: Push Docker image to Azure Container Registry
        run: docker push vdmprod.azurecr.io/samples/vendemmia-forecast

      - name: Recriar container no Portainer
        run: |
          TOKEN=$(curl -k -s -X POST "https://191.233.21.33:9000/api/auth" \
            -H "Content-Type: application/json" \
            -d '{"Username":"${{ vars.PORTAINER_USER_PROD }}","Password":"${{ secrets.PORTAINER_PASS_PROD }}"}' \
            | grep -o '"jwt":"[^\"]*"' | cut -d':' -f2 | sed 's/["}]//g')
          CONTAINER_ID=$(curl -k -s -X GET "https://191.233.21.33:9000/api/endpoints/3/docker/v1.41/containers/json?all=true&filters=%7B%22name%22%3A%5B%22vendemmia-forecast%22%5D%7D" \
            -H "Authorization: Bearer $TOKEN" \
            | grep -o '"Id":"[^"]*"' | head -n1 | cut -d':' -f2 | sed 's/"//g')
          curl -k -X POST "https://191.233.21.33:9000/api/docker/3/containers/$CONTAINER_ID/recreate" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"PullImage":true}'

      - name: Remover imagens Docker não utilizadas
        run: |
          TOKEN=$(curl -k -s -X POST "https://191.233.21.33:9000/api/auth" \
            -H "Content-Type: application/json" \
            -d '{"Username":"${{ vars.PORTAINER_USER_PROD }}","Password":"${{ secrets.PORTAINER_PASS_PROD }}"}' \
            | grep -o '"jwt":"[^\"]*"' | cut -d':' -f2 | sed 's/["}]//g')
          curl -k -X POST "https://191.233.21.33:9000/api/endpoints/3/docker/images/prune" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json"
