name: Build and Push Docker Image to Azure Container Registry

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copiar Dockerfile.prod para Dockerfile
        run: cp Dockerfile.prod Dockerfile

      - name: Preencher variáveis sensíveis no .env.docker.prod
        run: |
          escape() {
            printf '%s\n' "$1" | sed -e 's/[\/&]/\\&/g'
          }

          NEXTAUTH_SECRET_ESCAPED=$(escape "${{ secrets.ENV_PROD_NEXTAUTH_SECRET }}")
          TURSO_AUTH_TOKEN_ESCAPED=$(escape "${{ secrets.ENV_PROD_TURSO_AUTH_TOKEN }}")
          CONEXOS_PASSWORD_ESCAPED=$(escape "${{ secrets.ENV_PROD_CONEXOS_PASSWORD }}")
          MAILER_DSN_ESCAPED=$(escape "${{ secrets.AZURE_SMTP_MAILER_DSN }}")

          sed -i "s|^NEXTAUTH_SECRET=.*|NEXTAUTH_SECRET=$NEXTAUTH_SECRET_ESCAPED|g" .env.docker.prod
          sed -i "s|^TURSO_AUTH_TOKEN=.*|TURSO_AUTH_TOKEN=$TURSO_AUTH_TOKEN_ESCAPED|g" .env.docker.prod
          sed -i "s|^CONEXOS_PASSWORD=.*|CONEXOS_PASSWORD=$CONEXOS_PASSWORD_ESCAPED|g" .env.docker.prod
          sed -i "s|^MAILER_DSN=.*|MAILER_DSN=$MAILER_DSN_ESCAPED|g" .env.docker.prod

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: vdmprod.azurecr.io
          username: ${{ vars.AZURE_ACR_USERNAME_PROD }}
          password: ${{ secrets.AZURE_ACR_PASSWORD_PROD }}

      - name: Build Docker image
        run: docker build -t vendemmia-forecast .

      - name: Tag Docker image
        run: docker tag vendemmia-forecast vdmprod.azurecr.io/samples/vendemmia-forecast

      - name: Push Docker image to Azure Container Registry
        run: docker push vdmprod.azurecr.io/samples/vendemmia-forecast

      - name: Recriar container no Portainer
        env:
          PORTAINER_USER: ${{ vars.PORTAINER_USER_PROD }}
          PORTAINER_PASS: ${{ secrets.PORTAINER_PASS_PROD }}
          ACR_AUTH_B64: ${{ secrets.AZURE_ACR_AUTH_B64 }}
        run: |
          cat > /tmp/deploy.py << 'PYEOF'
          import os, json, sys, urllib.request, urllib.error, ssl

          BASE  = "https://191.233.21.33:9000"
          EP    = 3
          IMAGE = "vdmprod.azurecr.io/samples/vendemmia-forecast:latest"

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode    = ssl.CERT_NONE

          class P:
              token = ""
              def call(self, method, path, data=None, xh=None):
                  hdrs = {"Content-Type": "application/json"}
                  if self.token: hdrs["Authorization"] = f"Bearer {self.token}"
                  if xh: hdrs.update(xh)
                  body = json.dumps(data).encode() if data is not None else None
                  rq   = urllib.request.Request(f"{BASE}{path}", data=body, headers=hdrs, method=method)
                  try:
                      with urllib.request.urlopen(rq, context=ctx) as r:
                          raw = r.read()
                          return r.status, (json.loads(raw) if raw else {})
                  except urllib.error.HTTPError as e:
                      raw = e.read()
                      return e.code, (json.loads(raw) if raw else {"message": str(e)})

          p = P()

          # --- Auth ---
          _, auth = p.call("POST", "/api/auth", {
              "Username": os.environ["PORTAINER_USER"],
              "Password": os.environ["PORTAINER_PASS"],
          })
          p.token = auth.get("jwt", "")
          if not p.token:
              print("❌ Auth falhou:", auth); sys.exit(1)
          print("✅ Autenticado no Portainer")

          # --- Listar containers ---
          _, cs = p.call("GET", f"/api/endpoints/{EP}/docker/v1.41/containers/json?all=true")
          print(f"\nContainers encontrados ({len(cs)}):")
          for c in cs:
              print(f"  {c.get('Names')} [{c.get('Status')}] {c.get('Image','')[:60]}")

          # --- Localizar o container (tenta múltiplos nomes) ---
          cid = None
          for name in ["vendemmia-forecast", "forecast-app", "forecast"]:
              for c in cs:
                  if any(name in n for n in c.get("Names", [])):
                      cid = c["Id"]
                      print(f"\n✅ Alvo: {c['Names']} ({cid[:12]})")
                      break
              if cid: break

          if not cid:
              print("❌ Nenhum container encontrado com os nomes esperados.")
              sys.exit(1)

          # --- Inspecionar para obter configuração completa ---
          _, ins = p.call("GET", f"/api/endpoints/{EP}/docker/v1.41/containers/{cid}/json")
          cname = ins["Name"].lstrip("/")
          print(f"   Nome: {cname}")
          print(f"   Imagem atual: {ins['Config']['Image']}")

          # --- Pull nova imagem ---
          print("\n=== Pull nova imagem ===")
          st, _ = p.call("POST",
              f"/api/endpoints/{EP}/docker/v1.41/images/create?fromImage=vdmprod.azurecr.io/samples/vendemmia-forecast&tag=latest",
              xh={"X-Registry-Auth": os.environ.get("ACR_AUTH_B64", "")})
          print(f"HTTP {st}")

          # --- Stop ---
          print("\n=== Stop ===")
          st, _ = p.call("POST", f"/api/endpoints/{EP}/docker/v1.41/containers/{cid}/stop")
          print(f"HTTP {st}")

          # --- Remove ---
          print("\n=== Remove ===")
          st, resp = p.call("DELETE", f"/api/endpoints/{EP}/docker/v1.41/containers/{cid}?force=true")
          print(f"HTTP {st}", resp.get("message","") if st not in (200, 204) else "ok")

          # --- Montar body de criação baseado no inspect ---
          # Filtra campos que não são aceitos no endpoint de criação
          skip = {"Hostname", "Domainname", "AttachStdin", "AttachStdout",
                  "AttachStderr", "Tty", "OpenStdin", "StdinOnce"}
          cfg = {k: v for k, v in ins["Config"].items() if k not in skip}
          cfg["Image"]            = IMAGE
          cfg["HostConfig"]       = ins["HostConfig"]
          cfg["NetworkingConfig"] = {
              "EndpointsConfig": ins.get("NetworkSettings", {}).get("Networks", {})
          }

          # --- Create ---
          print("\n=== Create ===")
          st, new = p.call("POST",
              f"/api/endpoints/{EP}/docker/v1.41/containers/create?name={cname}", cfg)
          print(f"HTTP {st}")
          if st not in (200, 201) or "Id" not in new:
              print("❌ Create falhou:", new); sys.exit(1)

          new_id = new["Id"]
          print(f"Novo ID: {new_id[:12]}")

          # --- Start ---
          print("\n=== Start ===")
          st, _ = p.call("POST", f"/api/endpoints/{EP}/docker/v1.41/containers/{new_id}/start")
          print(f"HTTP {st}")
          if st in (204, 304):
              print(f"\n✅ Container '{cname}' recriado com a nova imagem!")
          else:
              print(f"⚠️ Start retornou {st}"); sys.exit(1)
          PYEOF
          python3 /tmp/deploy.py

      - name: Remover imagens Docker não utilizadas
        env:
          PORTAINER_USER: ${{ vars.PORTAINER_USER_PROD }}
          PORTAINER_PASS: ${{ secrets.PORTAINER_PASS_PROD }}
        run: |
          TOKEN=$(curl -k -s -X POST "https://191.233.21.33:9000/api/auth" \
            -H "Content-Type: application/json" \
            -d "{\"Username\":\"$PORTAINER_USER\",\"Password\":\"$PORTAINER_PASS\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('jwt',''))")
          if [ -n "$TOKEN" ]; then
            curl -k -s -X POST "https://191.233.21.33:9000/api/endpoints/3/docker/v1.41/images/prune" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{}' -w "\nPrune HTTP %{http_code}"
          fi
